# First-time setup on VPS:
# 1. Add DNS A record: calendar-sync.shubhammttl.com → VPS IP
# 2. sudo cp nginx/calendar-sync.conf /etc/nginx/sites-available/calendar-sync
# 3. sudo ln -s /etc/nginx/sites-available/calendar-sync /etc/nginx/sites-enabled/
# 4. sudo certbot --nginx -d calendar-sync.shubhammttl.com
# 5. sudo nginx -t && sudo systemctl reload nginx
# 6. cp .env.example .env && nano .env   (fill in all values)
# 7. npm run db:migrate
# 8. npm run build:prod
# 9. pm2 start ecosystem.config.cjs --env production
# 10. pm2 save && pm2 startup
#
# Subsequent deploys:
# git pull && npm run db:migrate && npm run build:prod && pm2 restart zoho-gcal

server {
    listen 80;
    server_name calendar-sync.shubhammttl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name calendar-sync.shubhammttl.com;

    ssl_certificate     /etc/letsencrypt/live/calendar-sync.shubhammttl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/calendar-sync.shubhammttl.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
